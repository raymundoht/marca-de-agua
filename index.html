<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watermark Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: rgba(255,215,0,0.1);
    --accent: #FFD700;
    --accent-dim: rgba(255,215,0,0.1);
    --accent-mid: rgba(255,215,0,0.3);
    --text: #f5f5f5;
    --muted: #555;
    --radius: 20px;
    --radius-sm: 14px;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 36px 16px 60px;
  }

  .app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .header { text-align: center; padding: 8px 0 4px; }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-mid);
    border-radius: 100px;
    padding: 5px 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .header h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1.1;
  }
  .header h1 span { color: var(--accent); }
  .header p { font-size: 12.5px; color: var(--muted); font-weight: 400; margin-top: 7px; }

  /* Canvas */
  .canvas-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .canvas-card:hover { border-color: var(--accent-mid); }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    user-select: none;
  }
  .placeholder-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    background: var(--surface);
    border: 1.5px dashed rgba(255,215,0,0.22);
    display: flex; align-items: center; justify-content: center;
  }
  .placeholder span { font-size: 12.5px; font-weight: 500; color: var(--muted); }

  canvas { display: none; width: 100%; height: 100%; object-fit: contain; }
  canvas.visible { display: block; }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .slider-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-value {
    font-size: 12px;
    font-weight: 700;
    color: #0a0a0a;
    background: var(--accent);
    padding: 3px 12px;
    border-radius: 100px;
    min-width: 52px;
    text-align: center;
  }

  .slider-track {
    position: relative;
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
  }
  .slider-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
    border-radius: 100px;
    pointer-events: none;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    position: absolute;
    top: -8px; left: 0;
    width: 100%;
    height: 22px;
    background: transparent;
    outline: none;
    cursor: pointer;
    margin: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 4px rgba(255,215,0,0.2), 0 2px 8px rgba(0,0,0,0.5);
    transition: box-shadow 0.15s, transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 7px rgba(255,215,0,0.2), 0 2px 12px rgba(0,0,0,0.6);
    transform: scale(1.1);
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px;
    border: none; border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* Actions */
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    width: 100%;
    padding: 15px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    transition: all 0.15s;
  }
  .btn-ghost {
    background: var(--card);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-ghost:hover { border-color: var(--accent-mid); color: var(--accent); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .btn-secondary:hover { border-color: var(--accent-mid); }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    font-weight: 700;
  }
  .btn-primary:hover {
    background: #ffe333;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,215,0,0.22);
  }
  .btn-primary:active { transform: translateY(0); box-shadow: none; }

  .status {
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    min-height: 16px;
  }
  .status.ok { color: var(--accent); }
  .status.err { color: #ff5f5f; }

  input[type=file] { display: none; }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-badge">
      <div class="badge-dot"></div>
      Watermark Studio
    </div>
    <h1>Marca tu <span>imagen</span></h1>
    <p>Aplica tu logo como marca de agua profesional</p>
  </div>

  <div class="canvas-card" onclick="selectImage()">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <span>Toca para seleccionar imagen</span>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- Opacity slider card -->
  <div class="card">
    <div class="slider-header">
      <span class="slider-label">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3a9 9 0 0 1 0 18"/>
        </svg>
        Opacidad
      </span>
      <span class="slider-value" id="opacityVal">20%</span>
    </div>
    <div class="slider-track">
      <div class="slider-fill" id="sliderFill" style="width:20%"></div>
      <input type="range" id="opacitySlider" min="1" max="100" value="20">
    </div>
  </div>

  <div class="actions">
    <div class="row">
      <button class="btn btn-ghost" onclick="selectImage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
        Imagen
      </button>
      <button class="btn btn-ghost" onclick="selectLogo()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        Logo
      </button>
    </div>
    <button class="btn btn-secondary" onclick="applyWatermark()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Generar marca de agua
    </button>
    <button class="btn btn-primary" onclick="download()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Descargar imagen
    </button>
    <div class="status" id="status"></div>
  </div>

</div>

<input type="file" id="upload" accept="image/*">
<input type="file" id="uploadLogo" accept="image/*">

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const opacitySlider = document.getElementById('opacitySlider');
  const opacityVal = document.getElementById('opacityVal');
  const sliderFill = document.getElementById('sliderFill');

  let baseImage = null;
  let logo = new Image();
  let finalImage = null;

  logo.src = "logo.png";
  logo.onerror = () => {};

  // Slider — live update value + fill + preview
  opacitySlider.addEventListener('input', function () {
    const v = this.value;
    opacityVal.textContent = v + '%';
    sliderFill.style.width = v + '%';
    if (baseImage && finalImage) livePreview();
  });

  function selectImage() { document.getElementById('upload').click(); }
  function selectLogo()  { document.getElementById('uploadLogo').click(); }

  document.getElementById('upload').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    baseImage = new Image();
    baseImage.onload = showPreview;
    baseImage.src = URL.createObjectURL(file);
    finalImage = null;
    this.value = '';
  });

  document.getElementById('uploadLogo').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    logo = new Image();
    logo.onload = () => { setStatus('Logo cargado ✓', 'ok'); };
    logo.src = URL.createObjectURL(file);
    this.value = '';
  });

  function showPreview() {
    const ratio = Math.min(800 / baseImage.width, 800 / baseImage.height);
    canvas.width  = baseImage.width  * ratio;
    canvas.height = baseImage.height * ratio;
    ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height);
    canvas.classList.add('visible');
    document.getElementById('placeholder').style.display = 'none';
    setStatus('Imagen cargada ✓', 'ok');
  }

  function buildWatermark(target) {
    const tc = target.getContext('2d');
    const W  = target.width;
    const H  = target.height;
    const opacity   = parseFloat(opacitySlider.value) / 100;
    const logoSize  = 120;
    const spacing   = 40;

    tc.clearRect(0, 0, W, H);
    tc.drawImage(baseImage, 0, 0, W, H);

    if (logo.complete && logo.naturalWidth > 0) {
      tc.globalAlpha = opacity;
      const centerY = H / 2 - logoSize / 2;
      for (let x = 0; x < W; x += logoSize + spacing) {
        tc.drawImage(logo, x, centerY, logoSize, logoSize);
      }
      tc.globalAlpha = 1;
    }
  }

  function livePreview() {
    const exp = document.createElement('canvas');
    exp.width  = baseImage.width;
    exp.height = baseImage.height;
    buildWatermark(exp);
    finalImage = exp;

    const ratio = Math.min(800 / exp.width, 800 / exp.height);
    canvas.width  = exp.width  * ratio;
    canvas.height = exp.height * ratio;
    ctx.drawImage(exp, 0, 0, canvas.width, canvas.height);
  }

  function applyWatermark() {
    if (!baseImage) { setStatus('Primero selecciona una imagen', 'err'); return; }
    livePreview();
    setStatus('Marca de agua aplicada ✓', 'ok');
  }

  function download() {
    if (!finalImage) { setStatus('Primero genera la marca de agua', 'err'); return; }
    const link = document.createElement('a');
    link.download = 'imagen-watermark.png';
    link.href = finalImage.toDataURL('image/png');
    link.click();
    setStatus('Descarga iniciada ✓', 'ok');
  }

  function setStatus(msg, type) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status ' + (type || '');
    clearTimeout(s._t);
    s._t = setTimeout(() => { s.textContent = ''; s.className = 'status'; }, 3000);
  }
</script>
</body>
</html>
